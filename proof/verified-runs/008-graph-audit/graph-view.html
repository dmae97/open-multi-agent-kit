<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OMK Ontology Graph — Open Multi-agent Kit</title>
  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <style>
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e5e7eb; }
    #top { min-height: 56px; display: flex; flex-wrap: wrap; align-items: center; gap: 12px; padding: 8px 16px; background: #111827; border-bottom: 1px solid #334155; box-sizing: border-box; }
    #cy { width: 100vw; height: calc(100vh - 72px); display: block; }
    input { background: #020617; color: #e5e7eb; border: 1px solid #475569; border-radius: 8px; padding: 8px 10px; width: min(420px, 70vw); }
    .stat { color: #94a3b8; font-size: 13px; }
    .pill { color: #c4b5fd; background: #312e81; border: 1px solid #4c1d95; border-radius: 999px; padding: 3px 8px; font-size: 12px; }
  </style>
</head>
<body>
  <div id="top">
    <strong>OMK Ontology Graph — Open Multi-agent Kit</strong>
    <span class="pill">ontology: omk-graph-audit-proof-v1</span>
    <input id="q" data-filter-hint="filter: File, Risk, provider, schema.prisma..." />
    <span class="stat">nodes: 5 / edges: 4</span>
  </div>
  <div id="cy"></div>

  <script>
    const allElements = [{"data":{"id":"decision:008-graph-audit-verdict","label":"008-graph-audit-verdict","type":"Decision","summary":"","path":"","tags":"","color":"#dc2626"}},{"data":{"id":"evidence:graph-run-evidence-linked","label":"graph-run-evidence-linked","type":"Evidence","summary":"","path":"","tags":"","color":"#16a34a"}},{"data":{"id":"provider:local-graph-audit","label":"local graph audit","type":"ProviderRoute","summary":"","path":"","tags":"","color":"#8b5cf6"}},{"data":{"id":"run:proof-008-graph-audit-20260531t080818z","label":"proof-008-graph-audit-20260531t080818z","type":"Run","summary":"","path":"","tags":"","color":"#14b8a6"}},{"data":{"id":"audit:run-evidence-decision","label":"run evidence decision audit","type":"AuditLink","summary":"","path":"","tags":"","color":"#eab308"}},{"data":{"id":"edge-0","source":"run:proof-008-graph-audit-20260531t080818z","target":"evidence:graph-run-evidence-linked","label":"run-evidence"}},{"data":{"id":"edge-1","source":"run:proof-008-graph-audit-20260531t080818z","target":"decision:008-graph-audit-verdict","label":"run-decision"}},{"data":{"id":"edge-2","source":"run:proof-008-graph-audit-20260531t080818z","target":"provider:local-graph-audit","label":"run-provider"}},{"data":{"id":"edge-3","source":"audit:run-evidence-decision","target":"run:proof-008-graph-audit-20260531t080818z","label":"audit-run"}}];
    const cy = cytoscape({
      container: document.getElementById("cy"),
      elements: allElements,
      wheelSensitivity: 0.15,
      style: [
        { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#e5e7eb", "font-size": 9, "text-wrap": "wrap", "text-max-width": 130, "width": 24, "height": 24, "border-width": 1, "border-color": "#f8fafc" } },
        { selector: "edge", style: { "width": 1, "line-color": "#64748b", "target-arrow-color": "#64748b", "target-arrow-shape": "triangle", "curve-style": "bezier", "label": "data(label)", "font-size": 7, "color": "#94a3b8", "text-rotation": "autorotate" } },
        { selector: ":selected", style: { "border-width": 4, "border-color": "#facc15", "line-color": "#facc15", "target-arrow-color": "#facc15" } }
      ],
      layout: { name: "cose", animate: false, nodeRepulsion: 9000, idealEdgeLength: 90, edgeElasticity: 80, gravity: 0.18, numIter: 1600 }
    });

    cy.on("tap", "node", (evt) => {
      const d = evt.target.data();
      alert(["type: " + d.type, "label: " + d.label, "path: " + (d.path || ""), "tags: " + (d.tags || ""), "", d.summary || ""].join("\n"));
    });

    document.getElementById("q").addEventListener("input", (event) => {
      const q = event.target.value.toLowerCase().trim();
      if (!q) {
        cy.elements().style("display", "element");
        return;
      }
      cy.nodes().forEach((node) => {
        const d = node.data();
        const text = [d.label, d.type, d.summary, d.path, d.tags].join(" ").toLowerCase();
        node.style("display", text.includes(q) ? "element" : "none");
      });
      cy.edges().forEach((edge) => {
        const visible = edge.source().style("display") !== "none" && edge.target().style("display") !== "none";
        edge.style("display", visible ? "element" : "none");
      });
    });
  </script>
</body>
</html>
