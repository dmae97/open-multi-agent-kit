version: "1.0.0"
defaultAction: allow
rules:
  - id: block-rm-rf
    description: "Block recursive force deletion of arbitrary paths"
    category: destructive
    origin: unified_policy
    toolName: bash
    pattern: "rm\\s+-rf|rm\\s+-r\\s+-f|rm\\s+-fr"
    enabled: false

  - id: block-curl
    description: "Block curl HTTP downloads in shell"
    category: network
    origin: unified_policy
    toolName: bash
    pattern: "\\bcurl\\b"
    enabled: false

  - id: block-wget
    description: "Block wget HTTP downloads in shell"
    category: network
    origin: unified_policy
    toolName: bash
    pattern: "\\bwget\\b"
    enabled: false

  - id: block-inline-fetch
    description: "Block inline fetch / requests / http.get in shell or JS"
    category: network
    origin: unified_policy
    toolName: bash
    pattern: "fetch\\('http|requests\\.get\\(|requests\\.post\\(|http\\.get\\(|http\\.request\\("
    enabled: false

  - id: block-sudo
    description: "Block privilege escalation via sudo"
    category: privilege_escalation
    origin: unified_policy
    toolName: bash
    pattern: "\\bsudo\\b"
    enabled: false

  - id: block-env-read
    description: "Block reading secret files or environment dumps"
    category: secret_exposure
    origin: unified_policy
    toolName: bash
    pattern: "\\.env|auth\\.json|id_rsa|private.*key|SECRET|TOKEN"
    enabled: false
