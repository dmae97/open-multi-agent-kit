name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          # GitHub-hosted runners occasionally ship broken Microsoft apt mirrors (NOSPLIT / unsigned InRelease).
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list 2>/dev/null || true
          sudo apt-get update -o Acquire::AllowReleaseInfoChange=true
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Check
        run: npm run check

      - name: Verify release consistency receipt
        id: verify_receipt
        run: node packages/coding-agent/dist/verify-ci.js

      - name: Upload release consistency receipt
        if: always() && steps.verify_receipt.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: verified-release-consistency
          path: .omk/ci-evidence
          if-no-files-found: error

      - name: Test
        run: npm test
