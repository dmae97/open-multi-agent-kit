name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: node --version && npm --version
      - run: npm ci
      - run: npm rebuild
      - run: npm run yaml:check
      - run: npm run lint
      - run: npm run secret:scan
      - run: npm run check
      - run: npm run build:clean
      - run: npm run test
      - name: Print test failures
        if: failure()
        run: |
          echo "=== failed-tests.txt ==="
          cat failed-tests.txt 2>/dev/null || true
          echo "=== test-summary.json ==="
          cat test-summary.json 2>/dev/null || true
      - uses: dtolnay/rust-toolchain@stable
      - run: npm run native:build
      - run: npm run audit:package

  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm rebuild
      - run: npm run release:check
