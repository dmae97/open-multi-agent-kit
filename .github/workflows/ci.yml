name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: node --version && npm --version
      - run: npm ci
      - run: npm rebuild
      - run: npm run yaml:check
      - run: npm run lint
      - run: npm run secret:scan
      - run: npm run check
      - run: npm run build:clean
      - name: Run tests with diagnostics
        run: |
          node scripts/run-tests.mjs > test-output.txt 2>&1
          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            echo "=== TEST FAILED (exit $exit_code) ==="
            tail -n 300 test-output.txt
            echo "=== DIAGNOSTICS ==="
            npm ls node-pty || true
            node -e "try { require('node-pty'); console.log('node-pty OK'); } catch(e) { console.log('node-pty FAIL:', e.message); }" || true
            ls -la failed-tests.txt test-summary.json 2>/dev/null || true
            cat failed-tests.txt 2>/dev/null || true
            cat test-summary.json 2>/dev/null || true
          fi
          exit $exit_code
        env:
          OMK_SKIP_DIST_FRESHNESS: "1"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm run native:build
      - run: npm run audit:package

  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm rebuild
      - run: npm run release:check
        env:
          OMK_SKIP_DIST_FRESHNESS: "1"
