name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  OMK_MCP_SUPPRESS_PRUNE_WARNINGS: "1"

permissions:
  contents: read

jobs:
  fast-gate:
    name: Fast Gate (lint/check/build/test/schema/proof/audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm rebuild
      - run: npm run lint
      - run: npm run check
      - run: npm run build:clean
      - run: npm run schema:check
      - run: npm run proof:check
      - run: npm run test
      - run: npm run native:build
      - run: npm run audit:package

  verify-no-kimi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm rebuild
      - run: npm run verify:no-kimi

  build:
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Pre-build diagnostics
        shell: bash
        run: |
          echo "=== Environment Diagnostics ==="
          node --version && npm --version
          env | grep -iE 'omk|kimi|node|home' || true
          echo "=== HOME contents ==="
          ls -la ~/
          echo "=== node-pty load test ==="
          node -e "try { require('node-pty'); console.log('node-pty: OK'); } catch(e) { console.log('node-pty: FAIL', e.message); }"
          echo "=== Cache cleared for clean install ==="
      - run: node --version && npm --version
      - run: npm ci
      - run: npm rebuild
      - run: npm run yaml:check
      - run: npm run lint
      - run: npm run secret:scan
      - run: npm run secret:scan:runtime
      - run: npm run check
      - run: npm run build:clean
      - name: Run tests with diagnostics
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set +e
          node scripts/run-tests.mjs > test-output.txt 2>&1
          exit_code=$?
          set -e
          if [ $exit_code -ne 0 ]; then
            echo "=== TEST FAILED (exit $exit_code) ==="
            head -n 200 test-output.txt
            echo "... [truncated] ..."
            tail -n 200 test-output.txt
            echo "=== DIAGNOSTICS ==="
            npm ls node-pty || true
            node -e "try { require('node-pty'); console.log('node-pty OK'); } catch(e) { console.log('node-pty FAIL:', e.message); }" || true
            ls -la failed-tests.txt test-summary.json 2>/dev/null || true
            cat failed-tests.txt 2>/dev/null || true
            cat test-summary.json 2>/dev/null || true
          fi
          exit $exit_code
      - name: Upload test artifacts
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs-${{ matrix.os }}-${{ matrix.node-version }}
          path: |
            test-output.txt
            failed-tests.txt
            test-summary.json
          if-no-files-found: ignore
      - uses: dtolnay/rust-toolchain@stable
      - run: npm run native:build
      - run: npm run audit:package

  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm rebuild
      - run: npm run release:check
