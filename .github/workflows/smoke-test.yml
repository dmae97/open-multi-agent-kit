name: Smoke Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # cache: npm  # disabled: suspected cache corruption causing intermittent test failures
      - run: npm ci --ignore-scripts
      - run: npm rebuild
      - run: npm run yaml:check
      - run: npm run build:clean
      - run: npm test 2>&1 | tee test-output.txt
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-outputs
          path: |
            test-output.txt
            failed-tests.txt
            test-summary.json
          if-no-files-found: ignore
      - run: npm run audit:package
      - run: npm pack --ignore-scripts --json
        env:
          TMPDIR: /tmp
          TMP: /tmp
          TEMP: /tmp
          npm_config_cache: /tmp/omk-npm-cache
      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: tarball
          path: "*.tgz"

  install-smoke:
    name: Install Smoke (${{ matrix.os }} / Node ${{ matrix.node-version }})
    needs: package
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball
      - name: Run smoke tests
        run: node scripts/smoke-test.mjs --tarball "*.tgz"

  audit:
    name: Package Audit
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build:clean
      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball
      - name: Audit tarball
        run: node scripts/package-audit.mjs --tarball "*.tgz"
