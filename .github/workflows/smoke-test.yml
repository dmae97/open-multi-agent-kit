name: Smoke Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  native:
    name: Native Safety (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild
      - uses: dtolnay/rust-toolchain@stable
      - run: npm run native:build
      - name: Upload native safety artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: dist/native
          if-no-files-found: error

  package:
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild
      - run: npm run yaml:check
      - run: npm run build:clean
      - run: OMK_SKIP_DIST_FRESHNESS=1 npm test
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-outputs
          path: |
            test-output.txt
            failed-tests.txt
            test-summary.json
          if-no-files-found: ignore
      - name: Download native safety artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: dist/native
          merge-multiple: true
      - name: Normalize native safety artifact modes
        run: npm run native:normalize
      - run: npm run audit:package
      - run: npm pack --ignore-scripts --json
      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: tarball
          path: oh-my-kimi-cli-*.tgz

  install-smoke:
    name: Install Smoke (${{ matrix.os }} / Node ${{ matrix.node-version }})
    needs: package
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball
      - name: Run smoke tests
        run: node scripts/smoke-test.mjs --tarball oh-my-kimi-cli-*.tgz

  audit:
    name: Package Audit
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build:clean
      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball
      - name: Audit tarball
        run: node scripts/package-audit.mjs --tarball oh-my-kimi-cli-*.tgz
