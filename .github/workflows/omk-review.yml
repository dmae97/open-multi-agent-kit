name: OMK Review

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  omk-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: OMK Review (CI mode)
        id: omk_review
        run: node dist/cli.js review --ci
        env:
          GITHUB_STEP_SUMMARY: /tmp/omk-review-summary.md
        # NOTE: --soft flag allows exit 0 even when issues are found.
        # Without --soft, blocking issues, quality gate failures, and schema
        # validation failures result in non-zero exit code.

      - name: Post review summary as PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## OMK Review (CI)\n\n';
            try {
              const summary = fs.readFileSync('/tmp/omk-review-summary.md', 'utf-8');
              if (summary.trim()) body = summary;
            } catch {
              body += '_No summary generated._';
            }
            const outcome = '${{ steps.omk_review.outcome }}';
            const statusEmoji = outcome === 'success' ? '✅' : '❌';
            body += `\n\n**Status:** ${statusEmoji} ${outcome}`;
            if (outcome !== 'success') {
              body += '\n\n> ⚠️ **Merge blocked:** OMK review failed. Fix issues before merging.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Check OMK Review outcome
        if: always()
        run: |
          if [ "${{ steps.omk_review.outcome }}" != "success" ]; then
            echo "OMK Review failed. See logs and PR comment for details."
            exit 1
          fi
