name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild
      - run: npm run yaml:check
      - run: npm run build
      - run: npm run lint
      - run: npm run secret:scan
      - run: npm run check
      - run: npm run rust:check
      - name: Run tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output-release
          path: test-output.log

  native:
    name: Native Safety (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild
      - run: npm run native:build
      - name: Upload native safety artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.os }}
          path: dist/native
          if-no-files-found: error

  package:
    runs-on: ubuntu-latest
    needs: [quality, native]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild
      - run: npm run build:clean
      - name: Download native safety artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: dist/native
          merge-multiple: true
      - name: Normalize native safety artifact modes
        run: npm run native:normalize
      - run: npm run audit:package
      - name: Pack tarball
        run: npm pack --ignore-scripts --json
      - name: Upload tarball
        uses: actions/upload-artifact@v7
        with:
          name: tarball
          path: oh-my-kimi-cli-*.tgz

  audit:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild
      - run: npm run build:clean
      - name: Download tarball
        uses: actions/download-artifact@v8
        with:
          name: tarball
      - name: Audit tarball
        run: node scripts/package-audit.mjs --tarball oh-my-kimi-cli-*.tgz

  smoke:
    name: Install Smoke (${{ matrix.os }} / Node ${{ matrix.node-version }})
    needs: [package, audit]
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Download tarball
        uses: actions/download-artifact@v8
        with:
          name: tarball
      - name: Run smoke tests
        run: node scripts/smoke-test.mjs --tarball oh-my-kimi-cli-*.tgz

  publish:
    runs-on: ubuntu-latest
    needs: [smoke]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - name: Download tarball
        uses: actions/download-artifact@v8
        with:
          name: tarball
      - name: Publish to npm
        run: npm publish oh-my-kimi-cli-*.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
