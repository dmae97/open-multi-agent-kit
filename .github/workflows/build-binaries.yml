name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.12.0)'
        required: true
        type: string
      source_ref:
        description: 'Source ref to build/publish (defaults to tag; use only for release recovery)'
        required: false
        type: string

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      SOURCE_REF: ${{ github.event.inputs.source_ref || github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.SOURCE_REF }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Build binaries
        run: ./scripts/build-binaries.sh

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${RELEASE_TAG}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix
          
          # Extract changelog section for this version
          cd packages/coding-agent
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > /tmp/release-notes.md
          
          # If empty, use a default message
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${VERSION}" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/coding-agent/binaries
          
          # Create release with changelog notes. Recovery reruns may use a newer
          # source_ref after the release was already created; immutable releases
          # cannot have assets clobbered, so let the build job pass and continue
          # to npm publishing when the release already exists.
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; skipping binary upload."
            exit 0
          fi

          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file /tmp/release-notes.md \
            omk-darwin-arm64.tar.gz \
            omk-darwin-x64.tar.gz \
            omk-linux-x64.tar.gz \
            omk-linux-arm64.tar.gz \
            omk-windows-x64.zip \
            omk-windows-arm64.zip

  publish-npm:
    runs-on: ubuntu-latest
    needs: build
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      SOURCE_REF: ${{ github.event.inputs.source_ref || github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.SOURCE_REF }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

      - name: Verify release artifacts are committed
        run: git diff --exit-code

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11.16.0 --ignore-scripts
          npm --version

      - name: Configure NPM_TOKEN authentication
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # An OIDC token alone is not enough to publish under npm trusted
          # publishing: the package owner must also have a trusted publisher
          # binding configured on npmjs.com. When the binding is missing, the
          # token-exchange endpoint returns a 404 'OIDC token exchange error -
          # package not found' and the publish fails. To stay resilient against
          # that misconfiguration, always wire NPM_TOKEN into ~/.npmrc when the
          # secret is set. The OIDC token is still used for the --provenance
          # attestation (which only requires id-token:write, not trusted
          # publishing).
          if [ -n "${NPM_TOKEN:-}" ]; then
            cat > "${HOME}/.npmrc" <<'EOF'
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
            echo "NPM_TOKEN configured for npm publish via ~/.npmrc."
            if [ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
              echo "OIDC token also available; provenance attestation will be attached."
            fi
          elif [ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set; relying on OIDC trusted publishing. Requires a trusted publisher binding at https://www.npmjs.com/settings/<owner>/trusted-publishers."
          else
            echo "::warning::Neither OIDC nor NPM_TOKEN is available. scripts/publish.mjs will fail with an actionable error."
          fi

      - name: Publish npm packages
        env:
          # Surface npm OIDC verbose log lines so trusted-publishing failures stop
          # being silent ENEEDAUTH at the final hop. The verbose channel reveals
          # whether the OIDC token-exchange returned a registry rejection or
          # whether the runner did not expose ACTIONS_ID_TOKEN_REQUEST_* to the
          # publish step. The token itself is never logged by npm.
          NPM_CONFIG_LOGLEVEL: verbose
          # NPM_TOKEN is forwarded only so publish.mjs's getPublishAuthMode() can
          # detect the npm-token-fallback path. The OIDC code path strips it from
          # the env before calling npm publish to avoid shadowing the OIDC token.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish.mjs
