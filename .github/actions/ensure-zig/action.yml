name: "ensure zig"
description: Ensure a pinned Zig binary is on PATH.

inputs:
   version:
      required: true
      description: Zig release version

runs:
   using: composite
   steps:
      - shell: bash
        env:
           ZIG_VERSION: ${{ inputs.version }}
        run: |
           set -euo pipefail
           if command -v zig >/dev/null 2>&1 && [ "$(zig version)" = "$ZIG_VERSION" ]; then
             echo "Using baked zig $ZIG_VERSION"
             exit 0
           fi

           case "$(uname -s)-$(uname -m)" in
             Linux-x86_64) archive="zig-x86_64-linux-${ZIG_VERSION}" ;;
             Darwin-arm64) archive="zig-aarch64-macos-${ZIG_VERSION}" ;;
             Darwin-x86_64) archive="zig-x86_64-macos-${ZIG_VERSION}" ;;
             *)
               echo "Unsupported zig host: $(uname -s)-$(uname -m)" >&2
               exit 1
               ;;
           esac

           tmpdir="${RUNNER_TEMP:-/tmp}/zig-${ZIG_VERSION}"
           bindir="${HOME}/.local/bin"
           rm -rf "$tmpdir"
           mkdir -p "$tmpdir" "$bindir"
           curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/${archive}.tar.xz" -o "$tmpdir/zig.tar.xz"
           tar -xJf "$tmpdir/zig.tar.xz" -C "$tmpdir"
           install -m755 "$tmpdir/${archive}/zig" "$bindir/zig"
           echo "$bindir" >> "$GITHUB_PATH"
           echo "Installed zig $("$bindir/zig" version)"
