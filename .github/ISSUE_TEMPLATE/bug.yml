name: Bug Report
description: Report a bug in open-multi-agent-kit
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction
      description: Steps to reproduce.
    validations:
      required: true
  - type: input
    attributes:
      label: Version
      description: open-multi-agent-kit version
    validations:
      required: true
