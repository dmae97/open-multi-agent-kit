name: Verified run
description: Submit a reproducible OMK run with validation evidence.
title: "[Verified run] "
labels: ["verified-run"]
body:
  - type: markdown
    attributes:
      value: |
        Use this when you can share concrete validation evidence for an OMK run. For v1.2 RC reports, include the package version, provider policy, and known caveats; do not include secrets or unverified claims.
  - type: input
    id: omk-version
    attributes:
      label: OMK version
      placeholder: "e.g. 1.2.0-rc.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, shell, Node.js, package manager"
    validations:
      required: true
  - type: input
    id: run-id
    attributes:
      label: Run ID
      description: Paste the OMK run id or proof bundle id that ties the artifacts together.
      placeholder: "e.g. chat-2026-05-31T05-20-57-565Z-3602298"
    validations:
      required: true
  - type: dropdown
    id: provider-policy
    attributes:
      label: Provider policy
      description: Select the provider policy used for the run.
      options:
        - auto
        - authority
        - kimi
        - mimo
        - deepseek
        - codex
        - opencode
        - commandcode
        - qwen
        - openrouter
        - local-llm
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or workflow
      description: Paste the command or high-level workflow used.
      render: shell
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation evidence
      description: Include redacted command output, test results, screenshot links, PR links, release links, or `omk verify --json` output. Say if evidence is incomplete.
      placeholder: "What proves the run completed successfully?"
    validations:
      required: true
  - type: textarea
    id: artifact-checksums
    attributes:
      label: Artifact checksums
      description: Provide SHA-256 checksums for attached proof artifacts or say why checksums are unavailable.
      render: text
      placeholder: "verify.json  <sha256>\nrun-manifest.json  <sha256>\nevidence.jsonl  <sha256>"
    validations:
      required: true
  - type: input
    id: command-exit-code
    attributes:
      label: Command exit code
      placeholder: "0 for passed runs; include non-zero values for failed/partial proof"
    validations:
      required: true
  - type: textarea
    id: repo-context
    attributes:
      label: Repo context
      placeholder: "Repo type, size, stack, and whether it was public or private."
    validations:
      required: true
  - type: textarea
    id: caveats
    attributes:
      label: Caveats
      placeholder: "Anything flaky, manual, slow, skipped, private, provider-specific, or release-candidate-only."
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, tokens, private keys, and private user data from this report.
          required: true
        - label: I removed local absolute paths or replaced them with repo-relative/sanitized paths.
          required: true
        - label: I did not fabricate output; missing evidence is listed in caveats.
          required: true
