name: Good first issue
description: Suggest or scope a small beginner-friendly contribution.
title: "[Good first issue] "
labels: ["good first issue"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the smallest useful change.
      placeholder: "What should a first-time contributor change?"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it helps
      placeholder: "What user or maintainer pain does this reduce?"
    validations:
      required: true
  - type: textarea
    id: suggested-scope
    attributes:
      label: Suggested scope
      placeholder: "Files, commands, or behavior likely involved. Keep this bounded."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Change is scoped and reviewable
        - [ ] Relevant validation command passes
    validations:
      required: true
  - type: textarea
    id: mentoring
    attributes:
      label: Contributor notes
      placeholder: "Pointers, gotchas, or maintainers willing to help."
